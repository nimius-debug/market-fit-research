name: Weekly ingestion

on:
  schedule:
    # Monday 08:17 UTC — well before that day's 15:23 UTC digest run, off the :00/:30 mark.
    # Weekly is a leftover from a since-removed RapidAPI adapter's quota, not a
    # constraint of the current default source (Arctic Shift) — see docs/deployment.md.
    - cron: "17 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: pipeline-state
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run weekly ingestion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pain-point-pipeline ingest

      - name: Commit updated pipeline state
        run: |
          git config user.name "pain-point-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/pipeline.sqlite3
          git diff --cached --quiet || git commit -m "Weekly ingestion: update pipeline state [skip ci]"
          git push
