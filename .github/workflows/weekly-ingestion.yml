name: Weekly ingestion

on:
  schedule:
    # Monday 08:17 UTC — well before that day's 15:23 UTC digest run, off the :00/:30 mark.
    # Weekly is a leftover from a since-removed RapidAPI adapter's quota, not a
    # constraint of the current default source (Arctic Shift) — see docs/deployment.md.
    - cron: "17 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: pipeline-state
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Job timeout stays above the ingest step's own timeout so that when
    # ingestion runs long, the *step* is what gets killed — the job survives
    # and the always() commit step below pushes whatever progress was made.
    # (A job-level kill would discard the runner, partial SQLite state and all,
    # which is how the first 6-subreddit run got stuck refetching everything.)
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run weekly ingestion
        timeout-minutes: 25
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pain-point-pipeline ingest

      - name: Commit updated pipeline state
        # always(): ingestion commits its SQLite state incrementally, so even a
        # timed-out run has durable progress worth pushing — the next run then
        # resumes from the unprocessed remainder instead of starting over.
        # data/ (not just the .sqlite3) so a hot -journal file left by a killed
        # process is committed too, letting SQLite recover cleanly on next open.
        if: always()
        run: |
          git config user.name "pain-point-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Weekly ingestion: update pipeline state [skip ci]"
          git push
