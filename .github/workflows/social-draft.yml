name: Social draft

# Picks at most one Opportunity per run worth a social post (see
# docs/deployment.md), writes a ready-to-copy-paste draft to
# SOCIAL_DRAFTS.md, renders its explainer video (HyperFrames -> the
# `social-videos` GitHub Release), and queues everything as a `pending` row
# in the approval Google Sheet via the Make.com webhook (MAKE_WEBHOOK_URL).
# Nothing is posted anywhere automatically -- posting waits for a human to
# polish the row in the Sheet and flip it to `approved`. A failed render
# never blocks the draft: the row queues with an empty video_url and
# Make.com posts text-only.

on:
  schedule:
    # Daily 12:30 UTC -- after that day's 08:17 UTC ingestion (fresh pool)
    # and before Monday's 15:23 UTC digest build.
    - cron: "30 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipeline-state
  cancel-in-progress: false

jobs:
  social-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: video/package-lock.json

      - name: Install dependencies
        run: |
          pip install -e .
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          npm ci --prefix video

      - name: Run social draft
        timeout-minutes: 20
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          SOCIAL_VIDEO_ENABLED: "true"
          # gh release upload in HyperFramesVideoAdapter authenticates with
          # this; the job's contents:write permission covers release assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pain-point-pipeline social-draft

      - name: Commit updated social drafts and pipeline state
        # SOCIAL_DRAFTS.md may not exist yet -- unlike DIGEST.md, a run that
        # finds no qualifying (or no LLM-approved) candidate writes nothing,
        # so `git add` must not choke on a missing path.
        if: always()
        run: |
          git config user.name "pain-point-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/
          [ -f SOCIAL_DRAFTS.md ] && git add SOCIAL_DRAFTS.md
          git diff --cached --quiet || git commit -m "Social draft [skip ci]"
          git push
