name: Social draft

# Picks at most one Opportunity per run worth a social post (see
# docs/deployment.md) and writes a ready-to-copy-paste draft to
# SOCIAL_DRAFTS.md. Draft-and-approve only -- nothing is posted anywhere
# automatically, and no platform API credentials are needed yet.

on:
  schedule:
    # Mon/Wed/Fri 12:30 UTC -- Monday's run lands after that day's 08:17 UTC
    # ingestion (fresh pool) and before the 15:23 UTC digest build.
    - cron: "30 12 * * 1,3,5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pipeline-state
  cancel-in-progress: false

jobs:
  social-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run social draft
        timeout-minutes: 10
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
        run: pain-point-pipeline social-draft

      - name: Commit updated social drafts and pipeline state
        # SOCIAL_DRAFTS.md may not exist yet -- unlike DIGEST.md, a run that
        # finds no qualifying (or no LLM-approved) candidate writes nothing,
        # so `git add` must not choke on a missing path.
        if: always()
        run: |
          git config user.name "pain-point-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/
          [ -f SOCIAL_DRAFTS.md ] && git add SOCIAL_DRAFTS.md
          git diff --cached --quiet || git commit -m "Social draft [skip ci]"
          git push
